name = "nusbus"
main = "src/index.ts"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

# Configure the custom domain
# Ensure "flovt.net" is added to your Cloudflare account
routes = [
	{ pattern = "nusbus.flovt.net", custom_domain = true }
]

[assets]
# Trunk outputs the wasm bundle and web assets to ../dist
directory = "../dist"
binding = "ASSETS"
# Keep client-side routing working if deep links are added later.
not_found_handling = "single-page-application"

# [vars]
# If the upstream API required a key, you would put it here.
# For nextbus.nusmods.com, it appears to be public, so no keys are needed currently.
# API_KEY = "your-api-key"

# [[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [[r2_buckets]]
# binding = "MY_BUCKET"
# bucket_name = "my-bucket"

# [[d1_databases]]
# binding = "DB"
# database_name = "my-database"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
