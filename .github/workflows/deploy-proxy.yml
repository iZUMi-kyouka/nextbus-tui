name: Deploy Proxy

on:
  push:
    branches: [master]
    paths:
      - "proxy_api/**"

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proxy_api/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deploy via Wrangler
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_SECRET_KEY }}
