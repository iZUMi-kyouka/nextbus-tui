<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nextbus-tui</title>
    <link data-trunk rel="rust" data-bin="nextbus-tui" data-wasm-opt="0" />
    <script>
      (function () {
        'use strict';

        var zoom  = 1.0;
        var STEP  = 1.15;
        var MIN   = 0.5;
        var MAX   = 3.0;

        // Shrink the canvas CSS dimensions by 1/zoom and scale it back up with
        // a CSS transform.  Ratzilla's check_canvas_resize() picks up the smaller
        // clientWidth/clientHeight on the next flush and rebuilds the terminal grid
        // at that size — fewer columns/rows, so each character cell appears larger,
        // exactly like a native terminal's Ctrl++ font-size increase.
        function applyZoom() {
          var canvas = document.querySelector('canvas');
          if (!canvas) return;

          var w = Math.round(window.innerWidth  / zoom);
          var h = Math.round(window.innerHeight / zoom);

          canvas.style.position        = 'absolute';
          canvas.style.top             = '0';
          canvas.style.left            = '0';
          canvas.style.width           = w + 'px';
          canvas.style.height          = h + 'px';
          canvas.style.transform       = 'scale(' + zoom + ')';
          canvas.style.transformOrigin = '0 0';
        }

        function onKey(e) {
          if (!e.ctrlKey) return;
          var prev = zoom;
          switch (e.key) {
            case '=': case '+': zoom = Math.min(zoom * STEP, MAX); break;
            case '-':           zoom = Math.max(zoom / STEP, MIN); break;
            case '0':           zoom = 1.0;                        break;
            default: return; // not a zoom key — let it through
          }
          e.preventDefault();
          if (zoom !== prev) applyZoom();
        }

        function onWheel(e) {
          if (!e.ctrlKey) return;
          e.preventDefault();
          var prev = zoom;
          zoom = e.deltaY < 0
            ? Math.min(zoom * STEP, MAX)
            : Math.max(zoom / STEP, MIN);
          if (zoom !== prev) applyZoom();
        }

        // Recalculate canvas dimensions whenever the viewport is resized.
        function onResize() { applyZoom(); }

        window.addEventListener('keydown', onKey,     { passive: false });
        window.addEventListener('wheel',   onWheel,   { passive: false });
        window.addEventListener('resize',  onResize);
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0b0f;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        /* Initial fill before JS zoom has been applied. */
        width: 100%;
        height: 100vh;
      }
      @media (min-width: 769px) {
        canvas {
          width: auto;
          height: auto;
          max-width: 100vw;
          max-height: 100vh;
        }
      }
    </style>
  </head>
  <body></body>
</html>
